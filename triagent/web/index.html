<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Triagent — Ticket Queue</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="logo">▲</span>
        <div>
          <h1>Triagent</h1>
          <p class="tagline">Ranked, AI-triaged GitHub issues — most solvable first.</p>
        </div>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="Filters">
        <div class="control">
          <label for="search">Search title</label>
          <input id="search" type="search" placeholder="e.g. test, docs, parser…" />
        </div>
        <div class="control">
          <label for="repo">Repo</label>
          <select id="repo"><option value="">All repos</option></select>
        </div>
        <div class="control">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="">Any</option>
            <option value="easy">easy</option>
            <option value="medium">medium</option>
            <option value="hard">hard</option>
          </select>
        </div>
        <div class="control">
          <label for="minSolv">Min solvability: <span id="minSolvVal">0.00</span></label>
          <input id="minSolv" type="range" min="0" max="1" step="0.05" value="0" />
        </div>
      </section>

      <p id="status" class="status">Loading…</p>

      <ul id="queue" class="queue" aria-live="polite"></ul>
    </main>

    <footer class="site-footer">
      Triagent — Learn&nbsp;to&nbsp;Achieve's issue-triage tool. Read-only view of scored GitHub issues.
    </footer>

    <!-- Detail drawer -->
    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="d-title">
      <div class="drawer">
        <button id="closeDrawer" class="close" aria-label="Close detail">×</button>
        <div id="detailBody"><p class="status">Loading…</p></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
